name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_android:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: setup android sdk
        uses: android-actions/setup-android@v3

      - name: install android sdk components
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: accept android sdk licenses
        run: yes | sdkmanager --licenses >/dev/null

      - name: install frontend dependencies
        run: npm ci

      - name: build frontend
        run: npm run build

      - name: sync capacitor android assets
        run: npx --yes @capacitor/cli@8.2.0 sync android

      - name: build android release apk
        run: |
          set -euo pipefail
          cd android
          ./gradlew assembleRelease

      - name: package android artifact
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "Android release APK not found at $APK_PATH"
            exit 1
          fi

          mkdir -p release-artifacts
          cp "$APK_PATH" "release-artifacts/CodexMonitor_${VERSION}_android.apk"

      - name: upload android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            release-artifacts/CodexMonitor_*_android.apk

  release:
    runs-on: ubuntu-latest
    environment: release
    needs:
      - build_android
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-artifacts
          path: release-artifacts

      - name: Validate Android artifacts
        run: |
          set -euo pipefail
          mapfile -t android_apks < <(find release-artifacts -type f -name '*_android.apk' | sort)
          if [ ${#android_apks[@]} -eq 0 ]; then
            echo "No Android .apk artifacts found for release upload"
            find release-artifacts -type f | sort
            exit 1
          fi

      - name: Build release notes
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          cat > release-artifacts/release-notes.md <<NOTES
          Rebuild release assets for v${VERSION}.

          Included in this run:
          - Android release APK
          - Daemon binaries uploaded by the separate "Release Daemon Binaries" workflow
          NOTES

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          mapfile -t android_apks < <(find release-artifacts -type f -name '*_android.apk' | sort)
          if [ ${#android_apks[@]} -eq 0 ]; then
            echo "No Android .apk artifacts found for release upload"
            find release-artifacts -type f | sort
            exit 1
          fi

          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release upload "v${VERSION}" \
              --clobber \
              "${android_apks[@]}"
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes-file release-artifacts/release-notes.md \
              --target "$GITHUB_SHA" \
              "${android_apks[@]}"
          fi
