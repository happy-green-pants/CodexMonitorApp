name: Release Daemon Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.7.63)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build_daemon:
    name: Build daemon (${{ matrix.os }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: codex_monitor_daemon
            asset_name: codex_monitor_daemon-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: codex_monitor_daemon
            asset_name: codex_monitor_daemon-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: codex_monitor_daemon
            asset_name: codex_monitor_daemon-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: codex_monitor_daemon
            asset_name: codex_monitor_daemon-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: codex_monitor_daemon.exe
            asset_name: codex_monitor_daemon-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install CMake (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            pkg-config \
            libglib2.0-dev

      - name: Install CMake (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install cmake

      - name: Install LLVM (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install llvm -y --no-progress

      - name: Configure LLVM (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> $env:GITHUB_ENV
          echo "C:\\Program Files\\LLVM\\bin" >> $env:GITHUB_PATH

      - name: Build daemon
        run: |
          cd src-tauri
          cargo build --release --bin codex_monitor_daemon --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          strip src-tauri/target/${{ matrix.target }}/release/codex_monitor_daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: daemon-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    name: Release daemon binaries
    runs-on: ubuntu-latest
    needs: build_daemon
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Get tag from GitHub context (auto-triggered) or from input (manual trigger)
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          echo "Uploading daemon binaries to release $TAG"

          for dir in artifacts/daemon-*; do
            if [ -d "$dir" ]; then
              file=$(find "$dir" -type f | head -n 1)
              if [ -n "$file" ]; then
                filename=$(basename "$file")
                echo "Uploading $filename"
                gh release upload "$TAG" "$file" --clobber
              fi
            fi
          done

          echo "Daemon binaries uploaded to release $TAG"
