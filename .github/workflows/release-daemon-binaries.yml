name: Release Daemon Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.7.63)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build_daemon:
    name: Build daemon (${{ matrix.os }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Keep Linux builds on an older glibc baseline so downloaded daemon
          # binaries can still run on common server distributions.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: codex_monitor_daemon
            asset_name: codex_monitor_daemon-linux-x86_64
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: codex_monitor_daemon
            asset_name: codex_monitor_daemon-linux-aarch64
          # Use an explicit Apple Silicon runner label so the ARM macOS daemon
          # build stays on a stable macOS baseline instead of drifting with
          # macos-latest.
          - os: macos-15
            target: x86_64-apple-darwin
            artifact_name: codex_monitor_daemon
            asset_name: codex_monitor_daemon-macos-x86_64
          - os: macos-15
            target: aarch64-apple-darwin
            artifact_name: codex_monitor_daemon
            asset_name: codex_monitor_daemon-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: codex_monitor_daemon.exe
            asset_name: codex_monitor_daemon-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install LLVM (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install llvm -y --no-progress

      - name: Configure LLVM (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> $env:GITHUB_ENV
          echo "C:\\Program Files\\LLVM\\bin" >> $env:GITHUB_PATH

      - name: Reset Linux host build cache
        if: runner.os == 'Linux'
        run: |
          # rust-cache can restore host-side build scripts compiled on a newer
          # glibc baseline. Rebuild them on the current runner before cargo
          # touches whisper-rs-sys or other native crates.
          rm -rf src-tauri/target/release
          rm -rf src-tauri/target/${{ matrix.target }}/release/build

      - name: Build daemon
        run: |
          cd src-tauri
          cargo build --release --bin codex_monitor_daemon --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          strip src-tauri/target/${{ matrix.target }}/release/codex_monitor_daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: daemon-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Release daemon binaries
    runs-on: ubuntu-latest
    needs: build_daemon
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Get tag from GitHub context (auto-triggered) or from input (manual trigger)
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          echo "Waiting for release $TAG to be available"

          for attempt in $(seq 1 40); do
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG is ready"
              break
            fi
            if [ "$attempt" -eq 40 ]; then
              echo "Release $TAG not found after waiting"
              exit 1
            fi
            sleep 15
          done

          echo "Uploading daemon binaries to release $TAG"

          for dir in artifacts/daemon-*; do
            if [ -d "$dir" ]; then
              file=$(find "$dir" -type f | head -n 1)
              if [ -n "$file" ]; then
                artifact_dir=$(basename "$dir")
                target="${artifact_dir#daemon-}"
                case "$target" in
                  x86_64-unknown-linux-gnu)
                    asset_name="codex_monitor_daemon-linux-x86_64"
                    ;;
                  aarch64-unknown-linux-gnu)
                    asset_name="codex_monitor_daemon-linux-aarch64"
                    ;;
                  x86_64-apple-darwin)
                    asset_name="codex_monitor_daemon-macos-x86_64"
                    ;;
                  aarch64-apple-darwin)
                    asset_name="codex_monitor_daemon-macos-aarch64"
                    ;;
                  x86_64-pc-windows-msvc)
                    asset_name="codex_monitor_daemon-windows-x86_64.exe"
                    ;;
                  *)
                    echo "Unknown daemon artifact target: $target"
                    exit 1
                    ;;
                esac

                upload_path="artifacts/${asset_name}"
                # Give each uploaded release asset a real platform-specific
                # filename. GitHub asset labels are not enough because files
                # uploaded under the same basename overwrite each other.
                cp "$file" "$upload_path"

                echo "Uploading $asset_name from $file"
                gh release upload "$TAG" "$upload_path" --clobber
              fi
            fi
          done

          echo "Daemon binaries uploaded to release $TAG"
